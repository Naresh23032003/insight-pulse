apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: insight-pulse
spec:
  selector:
    app: insight-pulse-web # Ensure this matches your deployment labels exactly
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80         # The port the public sees
      targetPort: 3000 # The port your Next.js app is actually running on